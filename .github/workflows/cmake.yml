name: CMake
concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
    steps:
    - uses: actions/checkout@v3

    # Linux: install zlib via apt
    - name: Install zlib (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y zlib1g-dev

    # Windows: setup vcpkg and install zlib
    - name: Setup vcpkg (Windows)
      if: runner.os == 'Windows'
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: ''
        vcpkgDirectory: '${{ github.workspace }}/vcpkg'
        vcpkgGitCommitId: '2024.12.16'
        appendedCacheKey: ${{ hashFiles('**/CMakeLists.txt') }}

    - name: Install zlib via vcpkg (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        & "${{ github.workspace }}/vcpkg/vcpkg" install zlib:x64-windows

    # Windows: setup vcpkg and install zlib
    - name: Setup vcpkg (Windows)
      if: runner.os == 'Windows'
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: ''
        vcpkgDirectory: '${{ github.workspace }}/vcpkg'
        vcpkgGitCommitId: '2024.12.16'
        appendedCacheKey: ${{ hashFiles('**/CMakeLists.txt') }}

    - name: Install zlib via vcpkg (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        & "${{ github.workspace }}/vcpkg/vcpkg" install zlib:x64-windows

    # Windows: configure with vcpkg toolchain
    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: >
        cmake -B ${{github.workspace}}/build
        -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
        -DCMAKE_TOOLCHAIN_FILE=${{github.workspace}}/vcpkg/scripts/buildsystems/vcpkg.cmake

    # Linux / macOS: configure without vcpkg toolchain
    - name: Configure CMake (Linux / macOS)
      if: runner.os != 'Windows'
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
    - name: Build
      # Build your program with the given configuration
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Test
      working-directory: ${{github.workspace}}/build
      # Execute tests defined by the CMake configuration.
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest -C ${{env.BUILD_TYPE}}

